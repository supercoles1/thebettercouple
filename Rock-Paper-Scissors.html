<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="css/style.css" />
</head>

<!-- NAV -->
<header class="navbar">

  <nav>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock-Paper-Scissors 💖</title>
<style>
  body {
    margin: 0;
    font-family: "Poppins", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: linear-gradient(45deg, #ff43e0, #ffc0cb, #ff80bf);
    background-size: 400% 400%;
    animation: gradientMove 8s ease infinite;
    color: white;
    text-align: center;
  }

  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  h1 {
    text-shadow: 2px 2px 5px #ff0077;
    margin-bottom: 10px;
  }

  .logo {
    width: 130px;
    margin-bottom: 15px;
  }

  .buttons {
    display: flex;
    gap: 15px;
    margin: 20px 0;
  }

  .buttons button {
    background: rgba(255,255,255,0.2);
    border: 2px solid white;
    border-radius: 10px;
    padding: 15px 25px;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    color: white;
  }

  .buttons button:hover {
    background: rgba(255,255,255,0.4);
    transform: scale(1.1);
  }

  .status {
    font-size: 18px;
    text-shadow: 1px 1px 4px #ff0077;
    min-height: 140px;
  }

  .animate-choice {
    display: inline-block;
    font-size: 50px;
    margin: 0 10px;
    opacity: 0;
    transform: translateY(-50px) rotate(0deg);
    animation: dropIn 0.6s forwards;
  }

  @keyframes dropIn {
    0% { opacity: 0; transform: translateY(-50px) rotate(0deg); }
    50% { opacity: 1; transform: translateY(10px) rotate(360deg); }
    100% { opacity: 1; transform: translateY(0px) rotate(720deg); }
  }

  .player-label {
    color: #ff43e0;
    font-weight: bold;
    margin-right: 5px;
  }

  .cpu-label {
    color: #ffff66;
    font-weight: bold;
    margin-right: 5px;
  }

  #resetBtn {
    margin-top: 15px;
    padding: 10px 25px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #ff66ff;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 3px 6px rgba(0,0,0,0.3);
    transition: all 0.2s;
  }

  #resetBtn:hover {
    background: #ff33cc;
  }
</style>
</head>
<body class="game-page">
  
<img src="images/MyFunkoPop.png" alt="BreezyBre Logo" class="logo">
  
<p class="game-quote">
          "Rock, paper, scissors—one on one?
          Say less. I’ve already won in my head… I’m just waiting on you to catch up."
        <br><br>
        -Maurice
      </p>

      <h1>Rock-Paper-Scissors 💞</h1>

<div class="buttons">
  <button onclick="playerChoice('rock')">🪨 Rock</button>
  <button onclick="playerChoice('paper')">📄 Paper</button>
  <button onclick="playerChoice('scissors')">✂️ Scissors</button>
</div>

<div class="status" id="status">Best of 5: Make your move!</div>
<button id="resetBtn" onclick="resetGame()">Reset Game</button>

<script>
const status = document.getElementById("status");

let playerHistory = [];
let aiHistory = [];
let playerScore = 0;
let aiScore = 0;
let round = 1;
const maxRounds = 5;

// Hard AI: tries to predict your moves
function aiChoice() {
  if (playerHistory.length < 2) {
    const choices = ['rock', 'paper', 'scissors'];
    const choice = choices[Math.floor(Math.random()*3)];
    aiHistory.push(choice);
    return choice;
  }

  const lastMove = playerHistory[playerHistory.length - 1];
  const secondLastMove = playerHistory[playerHistory.length - 2];

  let predicted;
  if (lastMove === secondLastMove) {
    if(lastMove==='rock') predicted='paper';
    if(lastMove==='paper') predicted='scissors';
    if(lastMove==='scissors') predicted='rock';
  } else {
    const choices = ['rock', 'paper', 'scissors'];
    predicted = choices[Math.floor(Math.random()*3)];
  }

  aiHistory.push(predicted);
  return predicted;
}

// Disable buttons while animating
function disableButtons(state) {
  document.querySelectorAll(".buttons button").forEach(btn => btn.disabled = state);
}

async function playerChoice(choice) {
  if(round > maxRounds) return;
  disableButtons(true);
  const ai = aiChoice();
  playerHistory.push(choice);

  // Animate choices
  status.innerHTML = `
    <div><span class="player-label">You:</span><span class="animate-choice">${choiceEmoji(choice)}</span></div>
    <div><span class="cpu-label">Me:</span><span class="animate-choice">${choiceEmoji(ai)}</span></div>
  `;

  // Wait for animation
  await new Promise(resolve => setTimeout(resolve, 700));

  let result = "";
  if(choice === ai) result = "Draw!";
  else if(
    (choice === 'rock' && ai === 'scissors') ||
    (choice === 'paper' && ai === 'rock') ||
    (choice === 'scissors' && ai === 'paper')
  ) {
    result = "You Win this round!";
    playerScore++;
  } else {
    result = "I Wins this round!";
    aiScore++;
  }

  status.innerHTML = `
    <div><span class="player-label">You:</span>${choiceEmoji(choice)}</div>
    <div><span class="cpu-label">Me:</span>${choiceEmoji(ai)}</div>
    <div><b>${result}</b></div>
    <div>Score — You: ${playerScore} | Me: ${aiScore}</div>
    <div>Round ${round} of ${maxRounds}</div>
  `;

  round++;
  disableButtons(false);

  // If game over
  if(round > maxRounds){
    disableButtons(true);
    setTimeout(() => {
      let final = "";
      if(playerScore > aiScore) final = "🎉 You got me!";
      else if(aiScore > playerScore) final = "I am the Champion!";
      else final = "🤝 It's a Tie!";

      // Make winner visible
      status.innerHTML += `
        <div style="
          margin-top:15px; 
          padding:10px; 
          font-size:22px; 
          font-weight:bold; 
          color:#fff; 
          background: rgba(0,0,0,0.4); 
          border: 2px solid #fff; 
          border-radius: 10px;
          box-shadow: 0 0 10px #ff66ff;
        ">
          ${final}
        </div>
      `;
    }, 500);
  }
}

function choiceEmoji(choice) {
  if(choice==='rock') return '🪨';
  if(choice==='paper') return '📄';
  if(choice==='scissors') return '✂️';
}

// Reset Game Function
function resetGame() {
  playerHistory = [];
  aiHistory = [];
  playerScore = 0;
  aiScore = 0;
  round = 1;
  status.textContent = "Best of 5: Make your move!";
  disableButtons(false);
}
</script>

</body>
</html>
