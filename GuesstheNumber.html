<script>
  const cardsContainer = document.getElementById('cards');
  const status = document.getElementById('status');
  const restartBtn = document.getElementById('restart');

  // YOUR CUSTOM NUMBERS
  const customNumbers = [7, 13, 22, 45, 66, 88, 99, 101, 202, 777];

  let numberToGuess;
  let guessesLeft;

  function initGame() {
    cardsContainer.innerHTML = '';
    guessesLeft = 3;

    // Pick random number from YOUR list
    numberToGuess = customNumbers[
      Math.floor(Math.random() * customNumbers.length)
    ];

    status.textContent = `You have ${guessesLeft} guesses!`;
    restartBtn.style.display = 'none';

    // Create cards from your numbers
    customNumbers.forEach(num => {
      const card = document.createElement('div');
      card.classList.add('card');
      card.textContent = num;
      card.addEventListener('click', () => makeGuess(num));
      cardsContainer.appendChild(card);
    });
  }

  function makeGuess(guess) {
    if (guessesLeft <= 0) return;

    guessesLeft--;

    if (guess === numberToGuess) {
      status.textContent =
        `😡 REMATCH! I DEMAND A REMATCH. The number was ${numberToGuess}!`;
      endGame();
    } else if (guessesLeft > 0) {
      status.textContent =
        `Wrong! ${guessesLeft} guess${guessesLeft > 1 ? 'es' : ''} left.`;
    } else {
      status.textContent =
        `😂 You're TRASH! Game Over! My number was ${numberToGuess}. ❌`;
      endGame();
    }
  }

  function endGame() {
    restartBtn.style.display = 'inline-block';
  }

  restartBtn.addEventListener('click', initGame);

  initGame();
</script>
