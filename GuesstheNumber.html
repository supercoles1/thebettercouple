<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Guess the Number 💖</title>

  <link rel="stylesheet" href="css/style.css" />

  <style>
    #cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 15px;
    }

    .card {
      width: 60px;
      height: 90px;

      display: flex;
      justify-content: center;
      align-items: center;

      background: rgba(255,255,255,0.2);
      border: 2px solid white;
      border-radius: 12px;

      font-size: 24px;
      font-weight: bold;
      color: white;

      cursor: pointer;

      box-shadow: 0 5px 10px rgba(0,0,0,0.3);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.08);
      background: rgba(255,255,255,0.35);
    }

    #status {
      margin-top: 20px;
    }

    #restart {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      display: none;
    }

    @media (max-width: 500px) {

      .card {
        width: 52px;
        height: 78px;
        font-size: 20px;
      }

      #cards {
        gap: 10px;
      }
    }
  </style>
</head>

<body class="game-page">

  <!-- NAV -->
  <header class="navbar">
    <nav>
      <a href="index.html">Home</a>
      <a href="seating.html">Seating</a>
      <a href="menu.html">Menu</a>
      <a href="games.html">Games</a>
    </nav>
  </header>

  <!-- LOGO -->
  <img src="images/DeuceHulk.png" alt="BreezyBre Logo" class="game-logo">

  <!-- QUOTE -->
  <p class="game-quote">
    "Try to guess the number I’m thinking of.
    Good luck… honestly, most of the time I don’t even know what I’m thinking myself."
    <br><br>
    -Brelyn
  </p>

  <!-- TITLE -->
  <h1>Guess the Number 💖</h1>

  <!-- GAME -->
  <div id="cards"></div>

  <div id="status" class="game-status">
    You have 3 guesses!
  </div>

  <button id="restart" class="game-btn-style">
    Restart
  </button>

  <script>
    const cardsContainer = document.getElementById('cards');
    const status = document.getElementById('status');
    const restartBtn = document.getElementById('restart');

    let numberToGuess;
    let guessesLeft;

    function initGame() {

      cardsContainer.innerHTML = '';

      guessesLeft = 3;

      numberToGuess = Math.floor(Math.random() * 10) + 1;

      status.textContent = `You have ${guessesLeft} guesses!`;

      restartBtn.style.display = 'none';

      for(let i = 1; i <= 10; i++) {

        const card = document.createElement('div');

        card.classList.add('card');

        card.textContent = i;

        card.addEventListener('click', () => makeGuess(i));

        cardsContainer.appendChild(card);
      }
    }

    function makeGuess(guess) {

      if(guessesLeft <= 0) return;

      guessesLeft--;

      if(guess === numberToGuess) {

        status.textContent =
          `😡 REMATCH! I DEMAND A REMATCH. The number was ${numberToGuess}!`;

        endGame();

      } else if(guessesLeft > 0) {

        status.textContent =
          `Wrong! ${guessesLeft} guess${guessesLeft > 1 ? 'es' : ''} left.`;

      } else {

        status.textContent =
          `😂 You're TRASH! Game Over! My number was ${numberToGuess}. ❌`;

        endGame();
      }
    }

    function endGame() {
      restartBtn.style.display = 'inline-block';
    }

    restartBtn.addEventListener('click', initGame);

    initGame();
  </script>

</body>
</html>
