<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❌⭕❌</title>

<link rel="stylesheet" href="css/style.css" />

<style>
  body {
    background: linear-gradient(45deg, #ff43e0, #ffc0cb, #ff80bf);
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding-top: 20px;
    overflow-x: hidden;
  }

  img.logo {
    width: 150px;
    margin-bottom: 15px;
  }

  h1 {
    margin: 5px;
    color: white;
    font-size: 22px;
  }

  #game {
    display: grid;
    grid-template-columns: repeat(3, 70px);
    grid-template-rows: repeat(3, 70px);
    gap: 8px;
    margin-top: 10px;
  }

  .cell {
    width: 70px;
    height: 70px;
    background: #ff43e0;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    color: white;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .cell:hover {
    transform: scale(1.05);
  }

  #status {
    margin-top: 15px;
    font-size: 16px;
    color: white;
  }

  button {
    margin-top: 15px;
    padding: 8px 16px;
    border: none;
    background: #333;
    color: #fff;
    font-size: 14px;
    border-radius: 10px;
    cursor: pointer;
  }

  button:hover {
    background: #555;
  }

  /* =========================
     MEMORY STYLE END SCREEN
  ========================== */

  .end-screen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: none;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(4px);
    z-index: 999;
  }

  .end-box {
    background: white;
    padding: 25px;
    text-align: center;
    border-radius: 12px;
    width: 80%;
    max-width: 300px;
    box-shadow: 0 0 20px rgba(255, 0, 170, 0.6);
    animation: pop 0.4s ease;
  }

  @keyframes pop {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .end-title {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 10px;
    color: #ff0099;
  }

  .end-msg {
    font-size: 18px;
    margin-bottom: 15px;
    color: #444;
  }

  .end-box button {
    background: #ff43e0;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>

<body>

<img src="images/HerFunkoPop.png" class="logo">

<p class="game-quote">
  "Tic-tac-toe? I’ll let you go first… not because I have to, but because it makes the ending more embarrassing for you."
  <br><br>-Bria
</p>

<h1>Tic Tac Toe</h1>

<div id="game"></div>
<div id="status">Your turn (X)</div>
<button onclick="restartGame()">Restart</button>

<!-- END SCREEN -->
<div class="end-screen" id="endScreen">
  <div class="end-box">
    <div class="end-title" id="endTitle"></div>
    <div class="end-msg" id="endMessage"></div>
    <button onclick="restartGame()">Play Again</button>
  </div>
</div>

<script>
  const gameContainer = document.getElementById("game");
  const statusText = document.getElementById("status");

  const endScreen = document.getElementById("endScreen");
  const endTitle = document.getElementById("endTitle");
  const endMessage = document.getElementById("endMessage");

  let board = ["", "", "", "", "", "", "", "", ""];
  let currentPlayer = "X";
  let gameActive = true;

  function showEndScreen(title, message) {
    endTitle.textContent = title;
    endMessage.textContent = message;
    endScreen.style.display = "flex";
  }

  for (let i = 0; i < 9; i++) {
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.dataset.index = i;
    cell.addEventListener("click", handleCellClick);
    gameContainer.appendChild(cell);
  }

  function handleCellClick(e) {
    const index = e.target.dataset.index;
    if (board[index] !== "" || !gameActive) return;

    makeMove(index, currentPlayer);

    if (checkWinner(board, currentPlayer)) {
      gameActive = false;
      showEndScreen("🎉 Winner!", `${currentPlayer} wins the game!`);
      return;
    }

    if (!board.includes("")) {
      gameActive = false;
      showEndScreen("😐 Draw!", "No more moves left!");
      return;
    }

    currentPlayer = currentPlayer === "X" ? "O" : "X";
    statusText.textContent = "Bria is thinking...";
    setTimeout(cpuMove, 800);
  }

  function cpuMove() {
    let move;

    for (let i = 0; i < 9; i++) {
      if (board[i] === "") {
        move = i;
        break;
      }
    }

    makeMove(move, "O");

    if (checkWinner(board, "O")) {
      gameActive = false;
      showEndScreen("Dang! I Win!", "Beauty and Brains");
      return;
    }

    if (!board.includes("")) {
      gameActive = false;
      showEndScreen("😐 Draw!", "Nobody wins!");
      return;
    }

    currentPlayer = "X";
    statusText.textContent = "Your turn (X)";
  }

  function makeMove(index, player) {
    board[index] = player;
    gameContainer.children[index].textContent = player;
  }

  function checkWinner(b, p) {
    const winPatterns = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    return winPatterns.some(pattern =>
      pattern.every(i => b[i] === p)
    );
  }

  function restartGame() {
    board = ["", "", "", "", "", "", "", "", ""];
    gameActive = true;
    currentPlayer = "X";
    statusText.textContent = "Your turn (X)";
    [...gameContainer.children].forEach(c => c.textContent = "");
    endScreen.style.display = "none";
  }
</script>

</body>
</html>
