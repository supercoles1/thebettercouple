<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  body {
    background: linear-gradient(45deg, #ff43e0, #ffc0cb, #ff80bf);
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding-top: 20px;

    /* FIXES */
    overflow-x: hidden;   /* no left/right scroll */
    height: auto;         /* allow scrolling */
  }

  img.logo {
    width: 150px;          /* smaller */
    margin-bottom: 15px;
  }

  h1 {
    margin: 5px;
    color: #333;
    font-size: 22px;       /* smaller */
  }

  /* SMALLER GAME AREA */
  #game {
    display: grid;
    grid-template-columns: repeat(3, 70px);
    grid-template-rows: repeat(3, 70px);
    gap: 8px;
    margin-top: 10px;
  }

  .cell {
    width: 70px;
    height: 70px;
    background: #ff43e0;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;       /* smaller X/O */
    color: white;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .cell:hover {
    transform: scale(1.05);
  }

  #status {
    margin-top: 15px;
    font-size: 16px;
  }

  button {
    margin-top: 15px;
    padding: 8px 16px;
    border: none;
    background: #333;
    color: #fff;
    font-size: 14px;
    border-radius: 10px;
    cursor: pointer;
  }

  button:hover {
    background: #555;
  }
</style>
</head>
<body class="game-page">

<!-- Logo -->
<img src="images/HerFunkoPop.png" alt="BreezyBre Logo" class="logo">
  
<p class="game-quote">
          "Tic-tac-toe? I’ll let you go first… not because 
        I have to, but because it makes the ending more embarrassing for you."
        <br><br>
        -Bria
      </p>

<h1>Tic Tac Toe</h1>

<div id="game"></div>

<div id="status">Your turn (X)</div>
<button onclick="restartGame()">Restart</button>

<script>
  const gameContainer = document.getElementById("game");
  const statusText = document.getElementById("status");
  let board = ["", "", "", "", "", "", "", "", ""];
  let currentPlayer = "X";
  let gameActive = true;

  // Create the 9 cells
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.dataset.index = i;
    cell.addEventListener("click", handleCellClick);
    gameContainer.appendChild(cell);
  }

  function handleCellClick(e) {
    const index = e.target.dataset.index;
    if (board[index] !== "" || !gameActive) return;
    makeMove(index, currentPlayer);
    if (checkWinner(board, currentPlayer)) {
      endGame(`${currentPlayer} wins!`);
      return;
    } else if (!board.includes("")) {
      endGame("It's a draw!");
      return;
    }
    currentPlayer = "X" ? "O" : "X";
    statusText.textContent = "CPU thinking...";
    setTimeout(cpuMove, 800);
  }

  function cpuMove() {
    let bestScore = -Infinity;
    let move;
    for (let i = 0; i < 9; i++) {
      if (board[i] === "") {
        board[i] = "O";
        let score = minimax(board, 0, false, -Infinity, Infinity);
        board[i] = "";
        if (score > bestScore) {
          bestScore = score;
          move = i;
        }
      }
    }
    makeMove(move, "O");
    if (checkWinner(board, "O")) {
      endGame("CPU wins!");
    } else if (!board.includes("")) {
      endGame("It's a draw!");
    } else {
      currentPlayer = "X";
      statusText.textContent = "Your turn (X)";
    }
  }

  function makeMove(index, player) {
    board[index] = player;
    const cell = gameContainer.children[index];
    cell.textContent = player;
  }

  function minimax(newBoard, depth, isMaximizing, alpha, beta) {
    if (checkWinner(newBoard, "O")) return 10 - depth;
    if (checkWinner(newBoard, "X")) return depth - 10;
    if (!newBoard.includes("")) return 0;

    if (isMaximizing) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (newBoard[i] === "") {
          newBoard[i] = "O";
          let score = minimax(newBoard, depth + 1, false, alpha, beta);
          newBoard[i] = "";
          best = Math.max(score, best);
          alpha = Math.max(alpha, score);
          if (beta <= alpha) break;
        }
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (newBoard[i] === "") {
          newBoard[i] = "X";
          let score = minimax(newBoard, depth + 1, true, alpha, beta);
          newBoard[i] = "";
          best = Math.min(score, best);
          beta = Math.min(beta, score);
          if (beta <= alpha) break;
        }
      }
      return best;
    }
  }

  function checkWinner(b, player) {
    const winPatterns = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];
    return winPatterns.some(p => p.every(i => b[i] === player));
  }

  function endGame(message) {
    gameActive = false;
    statusText.textContent = message;
  }

  function restartGame() {
    board = ["", "", "", "", "", "", "", "", ""];
    gameActive = true;
    currentPlayer = "X";
    statusText.textContent = "Your turn (X)";
    [...gameContainer.children].forEach(c => c.textContent = "");
  }
</script>

</body>
</html>
